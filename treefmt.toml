# treefmt configuration for accessdump
# Multi-language code formatting

[global]
excludes = [
    # Git and version control
    "**/.gitignore",
    "**/.git/**",

    # Go module files (managed by go tooling)
    "go.sum",
    "go.mod",

    # Documentation and text files
    "**/*.txt",
    "CHANGELOG.md",
    "LICENSE",

    # Binary and data files
    "testdata/**",
    "vba-output/**",
    "**/*.mdb",
    "**/*.accdb",

    # Build artifacts
    "bin/**",
    "dist/**",
    "coverage.out",
    "coverage.html",
]

# Go formatter - simple and strict
[formatter.gofumpt]
command = "gofumpt"
options = ["-w"]
includes = ["*.go"]

# Go import organizer - runs after gofumpt
[formatter.gci]
command = "gci"
options = ["write"]
includes = ["*.go"]
priority = 1

# Markdown, YAML, JSON formatter
[formatter.prettier]
command = "prettier"
options = ["-w"]
includes = [
    "*.md",
    "*.yaml",
    "*.yml",
    "*.json",
]
